<body>
    <div class="container">
        <div class="header">
            <h1>🚀 WebSphere Migration Agents Dashboard</h1>
            <p>Transform, validate, and monitor your WebSphere to Open Liberty migrations</p>
        </div>

        <div id="notifications"></div>

        <div class="agent-grid">
            <!-- Code Transformation Agent -->
            <div class="agent-card">
                <h3>Code Transformation Agent</h3>
                <form id="transformForm">
                    <div class="form-group">
                        <label>Source Files (JSON)</label>
                        <textarea id="sourceFiles" rows="4"
                            placeholder='{"CustomerService.java": "/path/to/file.java"}'></textarea>
                    </div>
                    <div class="form-group">
                        <label>Target Platform</label>
                        <select id="targetPlatform">
                            <option value="open_liberty">Open Liberty</option>
                            <option value="tomcat_ee">Tomcat EE</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>LLM Provider</label>
                        <select id="llmProvider">
                            <option value="claude">Claude 4.5 Sonnet</option>
                            <option value="openai">GPT-4</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-primary" id="transformBtn">🔄 Start Transformation</button>
                </form>
            </div>

            <!-- Validation Agent -->
            <div class="agent-card">
                <h3>Validation Agent</h3>
                <form id="validateForm">
                    <div class="form-group">
                        <label>Project Path</label>
                        <input type="text" id="projectPath" placeholder="/path/to/migrated_open_liberty"
                            value="/Users/shameem/amazon-q-repos/was2oss_agent/output/migrated_open_liberty">
                    </div>
                    <div class="form-group">
                        <label>LLM Provider</label>
                        <select id="validationLlm">
                            <option value="openai">GPT-3.5 Turbo</option>
                            <option value="claude">Claude 4.5 Sonnet</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success" id="validateBtn">🧪 Start Validation</button>
                </form>
            </div>

            <!-- Human-in-Loop Orchestrator -->
            <div class="agent-card">
                <h3>Human-in-Loop Orchestrator</h3>
                <form id="orchestrateForm">
                    <div class="form-group">
                        <label>WebSphere Input Path</label>
                        <input type="text" id="webspherePath" placeholder="/path/to/websphere/files"
                            value="/home/ec2-user/websphere-migration-platform/sample-websphere">
                    </div>
                    <div class="form-group">
                        <label>Liberty Output Directory</label>
                        <input type="text" id="libertyOutput" placeholder="/path/to/output/directory"
                            value="migrated_open_liberty">
                    </div>
                    <div class="form-group">
                        <label>Max Iterations</label>
                        <select id="maxIterations">
                            <option value="1">1</option>
                            <option value="2">2</option>
                            <option value="3" selected>3</option>
                            <option value="5">5</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-info" id="orchestrateBtn">🎭 Start HITL Orchestration</button>
                </form>

                <div class="form-group" style="margin-top: 15px;">
                    <button type="button" class="btn btn-info" onclick="refreshJobs()">🔄 Refresh Jobs</button>
                </div>
            </div>
        </div>

        <!-- Job Status Panel -->
        <div class="status-panel">
            <h3>📊 Job Monitor</h3>
            <div id="jobsList">
                <p>Loading jobs...</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration with fallback
        const API_BASE = `http://${window.location.hostname}:8000`;
        const FALLBACK_MODE = false; // Set to true to use mock data for testing
        let activeJobs = new Set();
        let orchestrationJobs = new Set(); // Track orchestration jobs separately
        let pollInterval;

        // Notification system
        function showNotification(message, type = 'info') {
            const notificationsContainer = document.getElementById('notifications');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;

            notificationsContainer.appendChild(notification);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (notification.parentNode) {
                    notification.parentNode.removeChild(notification);
                }


            }, 5000);
        }

        // Initialize default source files
        function initializeDefaults() {
            const defaultSourceFiles = {
                "SimpleEJB.java": "/Users/shameem/amazon-q-repos/was2oss_agent/sample_legacy/SimpleEJB.java"
            };

            document.getElementById('sourceFiles').value = JSON.stringify(defaultSourceFiles, null, 2);

            // Also update other default input values
            const webspherePathInput = document.getElementById('webspherePath');
            if (webspherePathInput) {
                webspherePathInput.value = "/Users/shameem/amazon-q-repos/was2oss_agent/sample_legacy";
            }
        }

        // API helper function with enhanced error handling and fallback
        async function apiCall(endpoint, method = 'GET', data = null) {
            // Mock data for testing when server is down
            if (FALLBACK_MODE) {
                return mockApiCall(endpoint, method, data);
            }

            try {
                const options = {
                    method,
                    headers: {
                        'Content-Type': 'application/json',
                    }
                };

                if (data) {
                    options.body = JSON.stringify(data);
                }

                console.log(`Making ${method} request to: ${API_BASE}${endpoint}`);
                if (data) {
                    console.log('Request payload:', data);
                }

                // Add timeout to catch hanging requests
                const controller = new AbortController();
                const timeoutId = setTimeout(() => controller.abort(), 300000); // 5 minute timeout for LLM calls
                options.signal = controller.signal;

                const response = await fetch(`${API_BASE}${endpoint}`, options);
                clearTimeout(timeoutId);

                console.log(`Response status: ${response.status}`);
                console.log(`Response ok: ${response.ok}`);
                console.log(`Response headers:`, Object.fromEntries(response.headers.entries()));

                // Check if response is JSON
                const contentType = response.headers.get('content-type');
                if (!contentType || !contentType.includes('application/json')) {
                    const textResponse = await response.text();
                    console.error('Non-JSON response:', textResponse);
                    throw new Error(`Server returned non-JSON response: ${response.status}`);
                }

                const result = await response.json();
                console.log('Response data:', result);

                if (!response.ok) {
                    // Better error message based on status code
                    let errorMessage = result.message || result.error || `HTTP ${response.status}`;

                    switch (response.status) {
                        case 404:
                            errorMessage = `API endpoint not found: ${endpoint}`;
                            break;
                        case 500:
                            errorMessage = `Server error: ${errorMessage}`;
                            break;
                        case 503:
                            errorMessage = `Service unavailable: ${errorMessage}`;
                            break;
                    }

                    throw new Error(errorMessage);
                }

                return result;

            } catch (error) {
                console.error('API call failed:', error);

                // Provide more specific error messages
                if (error.name === 'AbortError') {
                    throw new Error('Request timed out after 5 minutes - LLM processing is taking longer than expected');
                } else if (error.message.includes('Failed to fetch') || error.message.includes('ERR_CONNECTION_REFUSED')) {
                    throw new Error('❌ Cannot connect to API server.\n\n🔧 Solutions:\n1. Check if server is running\n2. Start the API server on port 8000\n3. Check security groups allow port 8000\n4. Verify server is running: netstat -tlnp | grep :8000');
                } else if (error.message.includes('CORS')) {
                    throw new Error('CORS error - server needs to allow requests from this domain');
                } else if (error.message.includes('NetworkError')) {
                    throw new Error('Network error - check your internet connection');
                }

                throw error;
            }
        }

        // Mock API for testing when server is down
        function mockApiCall(endpoint, method, data) {
            console.log('🎭 Using mock API data (server unavailable)');

            if (endpoint === '/api/v1/jobs') {
                return Promise.resolve({
                    jobs: ['mock-job-1', 'mock-job-2']
                });
            } else if (endpoint.startsWith('/api/v1/jobs/')) {
                return Promise.resolve({
                    job_id: 'mock-job-1',
                    status: 'completed',
                    progress: 'Mock job completed',
                    result: { message: 'This is mock data - start your API server' }
                });
            } else if (method === 'POST') {
                return Promise.resolve({
                    job_id: 'mock-job-' + Date.now(),
                    status: 'started'
                });
            }

            return Promise.reject(new Error('Mock API: endpoint not implemented'));
        }

        // Form handlers
        document.addEventListener('DOMContentLoaded', function () {
            console.log('Dashboard initialized');
            initializeDefaults();

            // Transformation form
            const transformForm = document.getElementById('transformForm');
            if (transformForm) {
                transformForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    console.log('Transform form submitted');

                    const transformBtn = document.getElementById('transformBtn');
                    transformBtn.disabled = true;
                    transformBtn.textContent = '🔄 Processing...';

                    try {
                        // Validate and parse JSON
                        const sourceFilesValue = document.getElementById('sourceFiles').value.trim();
                        if (!sourceFilesValue) {
                            throw new Error('Source files cannot be empty');
                        }

                        let sourceFiles;
                        try {
                            sourceFiles = JSON.parse(sourceFilesValue);
                        } catch (jsonError) {
                            throw new Error('Invalid JSON in source files: ' + jsonError.message);
                        }

                        const targetPlatform = document.getElementById('targetPlatform').value;
                        const llmProvider = document.getElementById('llmProvider').value;

                        const request = {
                            source_files: sourceFiles,
                            target_platform: targetPlatform,
                            llm_provider: llmProvider
                        };

                        const result = await apiCall('/api/v1/transform', 'POST', request);

                        // Don't wait for completion - job runs in background
                        activeJobs.add(result.job_id);
                        addJobToMonitor(result.job_id, 'Transformation', 'started', new Date().toISOString());
                        startPolling();

                        showNotification(`✅ Transformation job started successfully! Job ID: ${result.job_id.substring(0, 8)}...`, 'success');
                        showNotification(`⏳ This will take 2-5 minutes. Monitor progress below.`, 'info');

                    } catch (error) {
                        console.error('Transformation error:', error);
                        showNotification('Transformation failed: ' + error.message, 'error');
                    } finally {
                        transformBtn.disabled = false;
                        transformBtn.textContent = '🔄 Start Transformation';
                    }
                });
            }

            // Validation form
            const validateForm = document.getElementById('validateForm');
            if (validateForm) {
                validateForm.addEventListener('submit', async function (e) {
                    e.preventDefault();
                    console.log('Validate form submitted');

                    const validateBtn = document.getElementById('validateBtn');
                    validateBtn.disabled = true;
                    validateBtn.textContent = '🧪 Processing...';

                    try {
                        const projectPath = document.getElementById('projectPath').value.trim();
                        const llmProvider = document.getElementById('validationLlm').value;

                        if (!projectPath) {
                            throw new Error('Project path cannot be empty');
                        }

                        const request = {
                            project_path: projectPath,
                            llm_provider: llmProvider
                        };

                        const result = await apiCall('/api/v1/validate', 'POST', request);

                        // Don't wait for completion - job runs in background
                        activeJobs.add(result.job_id);
                        addJobToMonitor(result.job_id, 'Validation', 'started', new Date().toISOString());
                        startPolling();

                        showNotification(`✅ Validation job started successfully! Job ID: ${result.job_id.substring(0, 8)}...`, 'success');
                        showNotification(`⏳ This will take 1-3 minutes. Monitor progress below.`, 'info');

                    } catch (error) {
                        console.error('Validation error:', error);
                        showNotification('Validation failed: ' + error.message, 'error');
                    } finally {
                        validateBtn.disabled = false;
                        validateBtn.textContent = '🧪 Start Validation';
                    }
                });
            }

            // Orchestration form
            const orchestrateForm = document.getElementById('orchestrateForm');
            if (orchestrateForm) {
                console.log('✅ Orchestration form found, adding event listener');
                orchestrateForm.addEventListener('submit', async function (e) {
                    console.log('🎭 Orchestrate form submitted');
                    e.preventDefault();

                    const orchestrateBtn = document.getElementById('orchestrateBtn');

                    // Prevent double submission
                    if (orchestrateBtn.disabled) {
                        console.log('⚠️ Button already disabled, preventing double submission');
                        return;
                    }

                    orchestrateBtn.disabled = true;
                    orchestrateBtn.textContent = '🎭 Starting...';

                    try {
                        const webspherePath = document.getElementById('webspherePath').value.trim();
                        const libertyOutput = document.getElementById('libertyOutput').value.trim();
                        const maxIterations = parseInt(document.getElementById('maxIterations').value);

                        // Enhanced validation
                        if (!webspherePath) {
                            throw new Error('WebSphere input path is required');
                        }
                        if (!libertyOutput) {
                            throw new Error('Liberty output directory is required');
                        }
                        if (!maxIterations || maxIterations < 1 || maxIterations > 10) {
                            throw new Error('Max iterations must be between 1 and 10');
                        }

                        console.log('📋 Orchestration request:', { webspherePath, libertyOutput, maxIterations });

                        const request = {
                            websphere_input: webspherePath,
                            liberty_output: libertyOutput,
                            max_iterations: maxIterations
                        };

                        console.log('🚀 Calling orchestration API...');
                        const result = await apiCall('/api/v1/orchestrate', 'POST', request);
                        console.log('✅ Orchestration API response:', result);

                        // Don't wait for completion - orchestration runs in background

        function formatValidationResult(result) {

        function formatOrchestrationResult(result) {

            if (result.transformation_history && result.transformation_history.length > 0) {

        function formatGenericResult(result) {
            return `<div style="background: #ffffff !important; color: #24292e !important; border: 2px solid #e1e4e8 !important; border-radius: 6px; padding: 15px; font-family: 'Courier New', monospace; line-height: 1.6;">${formatJSONRecursive(result, 0)}</div>`;
        }

        function formatJSONRecursive(obj, depth = 0) {
            if (obj === null) return '<span style="color: #6f42c1 !important; font-weight: bold;">null</span>';
            if (obj === undefined) return '<span style="color: #6f42c1 !important; font-weight: bold;">undefined</span>';

            const indent = '  '.repeat(depth);

            if (typeof obj === 'string') {
                return `<span style="color: #032f62 !important; font-weight: 500;">"${escapeHtml(obj)}"</span>`;
            } else if (typeof obj === 'number') {
                return `<span style="color: #005cc5 !important; font-weight: 600;">${obj}</span>`;
            } else if (typeof obj === 'boolean') {
                return `<span style="color: #e36209 !important; font-weight: 600;">${obj}</span>`;
            } else if (Array.isArray(obj)) {
                if (obj.length === 0) return '<span style="color: #24292e !important;">[]</span>';

                const id = 'array_' + Math.random().toString(36).substr(2, 9);
                let html = `<span class="json-toggle" onclick="toggleJSON('${id}')" style="color: #0366d6 !important; font-weight: bold; cursor: pointer; text-decoration: underline;">[▼] Array (${obj.length} items)</span>`;
                html += `<div id="${id}" style="margin-left: 20px; border-left: 3px solid #0366d6; padding-left: 15px; margin-top: 8px;">`;

                obj.forEach((item, index) => {
                    html += `<div style="margin: 6px 0; color: #24292e !important;"><span style="color: #d73a49 !important; font-weight: bold;">${index}:</span> ${formatJSONRecursive(item, depth + 1)}</div>`;
                });

                html += `</div>`;
                return html;
            } else if (typeof obj === 'object') {
                const keys = Object.keys(obj);
                if (keys.length === 0) return '<span style="color: #24292e !important;">{}</span>';

                const id = 'obj_' + Math.random().toString(36).substr(2, 9);
                let html = `<span class="json-toggle" onclick="toggleJSON('${id}')" style="color: #0366d6 !important; font-weight: bold; cursor: pointer; text-decoration: underline;">{▼} Object (${keys.length} properties)</span>`;
                html += `<div id="${id}" style="margin-left: 20px; border-left: 3px solid #0366d6; padding-left: 15px; margin-top: 8px;">`;

                keys.forEach(key => {
                    html += `<div style="margin: 6px 0; color: #24292e !important;"><span style="color: #d73a49 !important; font-weight: bold;">"${escapeHtml(key)}":</span> ${formatJSONRecursive(obj[key], depth + 1)}</div>`;
                });

                html += `</div>`;
                return html;
            }

            return `<span style="color: #24292e !important; font-weight: 500;">${escapeHtml(String(obj))}</span>`;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function toggleJSON(id) {
            const element = document.getElementById(id);
            const toggle = element.previousElementSibling;

            if (element.classList.contains('json-collapsed')) {
                element.classList.remove('json-collapsed');
                toggle.textContent = toggle.textContent.replace('[▶]', '[▼]').replace('{▶}', '{▼}');
            } else {
                element.classList.add('json-collapsed');
                toggle.textContent = toggle.textContent.replace('[▼]', '[▶]').replace('{▼}', '{▶}');
            }
        }

        function toggleCodePreview(fileId) {
            const element = document.getElementById('preview_' + fileId);
            const button = event.target;

            if (element.classList.contains('json-collapsed')) {
                element.classList.remove('json-collapsed');
                button.textContent = '👁️ Hide Code';
            } else {
                element.classList.add('json-collapsed');
                button.textContent = '👁️ View Code';
            }
        }
        function handleOrchestrationStatus(jobId, status, result, decisionPanel) {

        async function checkForHumanDecision(jobId) {
            try {
                const decision = await apiCall(`/api/v1/orchestrate/${jobId}/decision`);

                if (decision.needs_human_input) {
                    showHumanDecisionPanel(jobId, decision);

        function showHumanDecisionPanel(jobId, decisionData) {

            decisionPanel.innerHTML = `

                        ${options.includes('manual_fix') ? '<button class="btn btn-decision btn-manual-fix" onclick="submitHumanDecision(\'' + jobId + '\', \'manual_fix\')">✋ Manual Fix</button>' : ''}
                        ${options.includes('skip') ? '<button class="btn btn-decision btn-skip" onclick="submitHumanDecision(\'' + jobId + '\', \'skip\')">⏭️ Skip</button>' : ''}
                        ${options.includes('abort') ? '<button class="btn btn-decision btn-abort" onclick="submitHumanDecision(\'' + jobId + '\', \'abort\')">❌ Abort</button>' : ''}

                </div>

        async function submitHumanDecision(jobId, decision) {
            try {
                const feedbackElement = document.getElementById(`feedback-${jobId}`);
                const feedback = feedbackElement ? feedbackElement.value.trim() : '';

                const request = {
                    decision: decision,
                    feedback: feedback || undefined
                };

                await apiCall(`/api/v1/orchestrate/${jobId}/decision`, 'POST', request);

                // Hide the decision panel
                const decisionPanel = document.getElementById(`decision-panel-${jobId}`);
                if (decisionPanel) {
                    decisionPanel.classList.add('hidden');
                }

                // Update job status
                updateJobStatus(jobId, 'processing', `Processing human decision: ${decision}`);

                showNotification(`Decision "${decision}" submitted for job ${jobId.substring(0, 8)}...`, 'success');

            } catch (error) {
                console.error('Error submitting human decision:', error);
                showNotification('Error submitting decision: ' + error.message, 'error');
            }
        }
        // Polling functions with your API's status handling
        async function pollJobs() {

            for (const jobId of activeJobs) {

                        job.status,
                        job.progress,
                        job.result,
                        job.error,

                    );

                        if (job.status === 'waiting_for_human') {
                            console.log(`🤔 Found waiting_for_human job: ${jobId}`);
                            setTimeout(() => checkForHumanDecision(jobId), 1000);
                        }
                    } catch (error) {
                        console.error(`Error loading job ${jobId}:`, error);
                    }
                }

                // Start polling if there are active jobs
                if (activeJobs.size > 0) {
                    startPolling();
                }

            } catch (error) {
                console.error('Error refreshing jobs:', error);
                showNotification('Error refreshing jobs: ' + error.message, 'error');
                document.getElementById('jobsList').innerHTML = '<p>Error loading jobs. Please try again.</p>';
            }
        }

        // Orchestrator function with manual decision trigger
        function startOrchestrator() {
            console.log('Legacy orchestrator function called');
            showNotification('Please use the HITL Orchestration form above to start a new orchestration workflow.', 'info');
        }

        // Manual decision trigger for debugging
        function triggerDecisionCheck() {
            console.log('🔍 Manually checking for human decisions...');
            for (const jobId of activeJobs) {
                console.log(`Checking job ${jobId}...`);
                checkForHumanDecision(jobId);
            }
        }

        // Global error handler
        window.addEventListener('error', function (e) {
            console.error('Global error:', e.error);
            showNotification('An unexpected error occurred. Check the console for details.', 'error');
        });

        // Add unhandled promise rejection handler
        window.addEventListener('unhandledrejection', function (e) {
            console.error('Unhandled promise rejection:', e.reason);
            showNotification('An unexpected error occurred. Check the console for details.', 'error');
        });

        console.log('WebSphere Migration Dashboard loaded successfully');
    </script>
</body>

</html>
