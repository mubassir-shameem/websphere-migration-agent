<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSphere Migration Agent</title>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        /* ============================================
           MONOCHROME GLASS UI - CSS VARIABLES
           ============================================ */

        :root {
            /* Dark Mode (Default) */
            --bg-body: #000000;
            --bg-surface: rgba(30, 30, 30, 0.7);
            --border-panel: rgba(255, 255, 255, 0.08);
            --text-primary: #FFFFFF;
            --text-secondary: #9CA3AF;
            --success: #10B981;
            --error: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --console-bg: #0A0A0A;
            --console-text: #D1D5DB;
        }

        [data-theme="light"] {
            --bg-body: #F9FAFB;
            --bg-surface: rgba(255, 255, 255, 0.9);
            --border-panel: rgba(0, 0, 0, 0.06);
            --text-primary: #111827;
            --text-secondary: #6B7280;
            /* Log console stays dark */
        }

        /* ============================================
           GLOBAL STYLES
           ============================================ */

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.6;
            transition: background 0.3s ease;
        }

        /* ============================================
           GLASS PANELS
           ============================================ */

        .glass-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-panel);
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            transition: all 0.3s ease;
        }

        .glass-panel:hover {
            border-color: rgba(255, 255, 255, 0.12);
        }


        /* ============================================
           SIDEBAR NAVIGATION
           ============================================ */
        
        .sidebar {
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            width: 260px;
            padding: 20px 0;
            transition: width 0.3s ease;
            overflow-y: auto;
            overflow-x: hidden;
            z-index: 100;
        }
        
        .sidebar.collapsed {
            width: 70px;
        }
        
        .sidebar-header {
            padding: 0 20px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        
        .sidebar-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 16px;
            font-weight: 600;
        }
        
        .sidebar.collapsed .sidebar-logo span {
            display: none;
        }
        
        .sidebar-toggle {
            background: transparent;
            border: none;
            color: var(--text-primary);
            cursor: pointer;
            padding: 8px;
            border-radius: 6px;
            transition: all 0.2s ease;
        }
        
        .sidebar-toggle:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .sidebar-nav {
            padding: 0 12px;
            margin-bottom: 24px;
        }
        
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            width: 100%;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            text-align: left;
            margin-bottom: 4px;
            position: relative;
        }
        
        .nav-item:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
        }
        
        .nav-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
        }
        
        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 60%;
            background: var(--text-primary);
            border-radius: 0 3px 3px 0;
        }
        
        .nav-item.primary {
            background: var(--text-primary);
            color: var(--bg-body);
            font-weight: 600;
        }
        
        .nav-item.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }
        
        .sidebar.collapsed .nav-item span:not(.badge) {
            display: none;
        }
        
        .badge {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.2);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .sidebar.collapsed .badge {
            display: none;
        }
        
        .sidebar-section {
            padding: 0 12px;
            margin-top: 24px;
        }
        
        .sidebar-section h3 {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            padding: 0 16px 12px;
        }
        
        .sidebar.collapsed .sidebar-section {
            display: none;
        }
        
        .job-list-sidebar {
            max-height: 350px;
            overflow-y: auto;
        }
        
        .job-item-sidebar {
            padding: 10px 16px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }
        
        .job-item-sidebar:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .job-item-sidebar.active {
            background: rgba(255, 255, 255, 0.1);
        }
        
        .job-item-header {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }
        
        .job-item-time {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        /* ============================================
           MAIN CONTENT WITH SIDEBAR
           ============================================ */
        
        .app-container {
            display: flex;
        }
        
        .main-content {
            margin-left: 260px;
            flex: 1;
            transition: margin-left 0.3s ease;
            min-height: 100vh;
        }
        
        .sidebar.collapsed ~ .main-content {
            margin-left: 70px;
        }
        
        .view {
            display: none;
        }
        
        .view.active {
            display: block;
        }
        
        /* ============================================
           HEADER
           ============================================ */

        .header {
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .theme-toggle {
            background: var(--bg-surface);
            border: 1px solid var(--border-panel);
            border-radius: 8px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .theme-toggle:hover {
            border-color: rgba(255, 255, 255, 0.2);
        }

        /* ============================================
           START MIGRATION CARD
           ============================================ */

        .start-card {
            padding: 24px;
            margin-bottom: 32px;
        }

        .start-card h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-panel);
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            color: var(--text-secondary);
            border-bottom: 2px solid transparent;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .drop-zone {
            border: 2px dashed var(--border-panel);
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 20px;
        }

        .drop-zone:hover {
            border-color: rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.02);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-secondary);
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 10px 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-panel);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        /* ============================================
           BUTTONS
           ============================================ */

        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-body);
            width: 100%;
            justify-content: center;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(255, 255, 255, 0.2);
        }

        .btn-secondary {
            background: transparent;
            border: 1px solid var(--border-panel);
            color: var(--text-primary);
        }

        .btn-secondary:hover {
            border-color: rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.05);
        }

        /* ============================================
           TIMELINE - MIGRATION HISTORY
           ============================================ */

        .timeline-section {
            margin-bottom: 32px;
        }

        .timeline-section h2 {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            color: var(--text-secondary);
        }

        .timeline {
            position: relative;
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 20px;
            top: 24px;
            bottom: 24px;
            width: 2px;
            background: var(--border-panel);
        }

        .job-card {
            position: relative;
            margin-bottom: 16px;
            padding: 20px;
            margin-left: 48px;
        }

        .job-card::before {
            content: '';
            position: absolute;
            left: -28px;
            top: 24px;
            width: 12px;
            height: 12px;
            background: var(--bg-body);
            border: 2px solid var(--border-panel);
            border-radius: 50%;
        }

        .job-card.status-success::before {
            border-color: var(--success);
            background: var(--success);
        }

        .job-card.status-failed::before {
            border-color: var(--error);
            background: var(--error);
        }

        .job-card.status-running::before {
            border-color: var(--info);
            background: var(--info);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .job-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }

        .job-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .job-id {
            font-size: 16px;
            font-weight: 600;
        }

        .job-timestamp {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .job-header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            backdrop-filter: blur(8px);
            border: 1px solid;
        }

        .status-badge.success {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.15);
            border-color: rgba(239, 68, 68, 0.3);
            color: var(--error);
        }

        .status-badge.running {
            background: rgba(59, 130, 246, 0.15);
            border-color: rgba(59, 130, 246, 0.3);
            color: var(--info);
        }

        .status-badge.waiting {
            background: rgba(245, 158, 11, 0.15);
            border-color: rgba(245, 158, 11, 0.3);
            color: var(--warning);
        }

        .duration {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .chevron {
            transition: transform 0.2s ease;
        }

        .chevron.expanded {
            transform: rotate(180deg);
        }

        /* ============================================
           JOB BODY
           ============================================ */

        .job-body {
            margin-top: 20px;
            display: none;
        }

        .job-body.expanded {
            display: block;
        }

        /* ============================================
           PHASE PILLS
           ============================================ */

        .phase-pills {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .phase-pill {
            padding: 8px 16px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            border: 1px solid;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 13px;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .phase-pill.completed {
            background: rgba(16, 185, 129, 0.15);
            border-color: rgba(16, 185, 129, 0.3);
            color: var(--success);
        }

        .phase-pill.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        .phase-pill.pending {
            background: rgba(156, 163, 175, 0.1);
            border-color: rgba(156, 163, 175, 0.2);
            color: var(--text-secondary);
        }

        .phase-pill:hover {
            transform: translateY(-1px);
        }

        /* ============================================
           LOG CONSOLE
           ============================================ */

        .log-console {
            background: var(--console-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 16px;
            font-family: 'JetBrains Mono', 'Fira Code', 'Consolas', monospace;
            font-size: 13px;
            line-height: 1.5;
            color: var(--console-text);
            max-height: 400px;
            overflow-y: auto;
            margin-top: 16px;
            display: none;
        }

        .log-console.visible {
            display: block;
        }

        .log-line {
            padding: 2px 0;
            border-left: 2px solid transparent;
            padding-left: 8px;
        }

        .log-line.success {
            border-left-color: var(--success);
            color: var(--success);
        }

        .log-line.error {
            border-left-color: var(--error);
            color: var(--error);
            background: rgba(239, 68, 68, 0.05);
        }

        .log-time {
            color: #6B7280;
            margin-right: 12px;
            font-weight: 600;
        }

        /* ============================================
           HITL DECISION PANEL
           ============================================ */

        .hitl-panel {
            padding: 20px;
            margin-top: 20px;
            border-left: 3px solid var(--warning);
        }

        .hitl-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .hitl-header h4 {
            font-size: 16px;
            font-weight: 600;
        }

        .hitl-error {
            background: var(--console-bg);
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 16px;
            font-family: monospace;
            font-size: 13px;
            color: var(--error);
        }

        .hitl-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .hitl-info {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hitl-info code {
            background: rgba(255, 255, 255, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }

        /* ============================================
           UTILITIES
           ============================================ */

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 32px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }
    </style>
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header glass-panel">
            <h1>
                <i data-lucide="zap"></i>
                WebSphere Migration Agent
            </h1>
            <button class="theme-toggle" onclick="toggleTheme()">
                <i data-lucide="sun" id="theme-icon"></i>
                <span id="theme-text">Dark</span>
            </button>
        </header>

        <!-- Start Migration Card -->
        <div class="start-card glass-panel">
            <h2>Start New Migration</h2>

            <div class="tabs">
                <div class="tab active" onclick="switchTab('upload')">
                    Upload ZIP
                </div>
                <div class="tab" onclick="switchTab('path')">
                    Server Path
                </div>
            </div>

            <div id="tab-upload" class="tab-content active">
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <input type="file" id="fileInput" accept=".zip" style="display: none" onchange="handleFile(this)">
                    <p>Drag & drop ZIP file here<br>or click to browse</p>
                </div>
                <div id="upload-status" style="font-size: 14px; color: var(--text-secondary); margin-bottom: 16px;">
                </div>
            </div>

            <div id="tab-path" class="tab-content">
                <div class="form-group">
                    <label>WebSphere Input Path</label>
                    <input type="text" id="inputPath" placeholder="/path/to/websphere/project"
                        value="/Users/shameem/amazon-q-repos/was2oss_agent/sample_legacy">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>Output Directory</label>
                    <input type="text" id="outputDir" value="migrated_open_liberty">
                </div>
                <div class="form-group">
                    <label>Max Iterations</label>
                    <select id="maxIterations">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="3" selected>3</option>
                        <option value="5">5</option>
                    </select>
                </div>
            </div>

            <button class="btn btn-primary" onclick="startMigration()">
                <i data-lucide="play-circle"></i>
                Start Migration
            </button>
        </div>

        <!-- Migration History Timeline -->
        <div class="timeline-section">
            <h2>Migration History</h2>
            <div id="timeline" class="timeline">
                <div class="empty-state">
                    <i data-lucide="inbox"></i>
                    <p>No migrations yet. Start your first migration above!</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // GLOBAL CONFIGURATION
        // ============================================

        const API_BASE = `http://${window.location.hostname}:8000`;
        let activeJobs = new Set();
        let pollInterval = null;
        let currentUploadPath = null;

        // ============================================
        // THEME MANAGEMENT
        // ============================================

        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.dataset.theme || 'dark';
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            html.dataset.theme = newTheme;
            localStorage.setItem('theme', newTheme);

            document.getElementById('theme-text').textContent = newTheme === 'dark' ? 'Dark' : 'Light';
            document.getElementById('theme-icon').setAttribute('data-lucide', newTheme === 'dark' ? 'sun' : 'moon');
            lucide.createIcons();
        }

        // Initialize theme from localStorage
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.dataset.theme = savedTheme;
        document.getElementById('theme-text').textContent = savedTheme === 'dark' ? 'Dark' : 'Light';

        // ============================================
        // TAB SWITCHING
        // ============================================

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

            event.target.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // ============================================
        // FILE UPLOAD
        // ============================================

        async function handleFile(input) {
            const file = input.files[0];
            if (!file) return;

            const statusDiv = document.getElementById('upload-status');
            statusDiv.innerHTML = '<span style="color: var(--info)">Uploading...</span>';

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch(`${API_BASE}/api/v1/upload`, {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) throw new Error('Upload failed');

                const result = await response.json();
                currentUploadPath = result.path;

                statusDiv.innerHTML = `<span style="color: var(--success)">✓ Uploaded: ${result.filename}</span>`;
            } catch (error) {
                statusDiv.innerHTML = `<span style="color: var(--error)">✗ Error: ${error.message}</span>`;
            }
        }

        // Drag & drop
        const dropZone = document.getElementById('dropZone');
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = 'rgba(255, 255, 255, 0.3)';
        });
        dropZone.addEventListener('dragleave', () => {
            dropZone.style.borderColor = '';
        });
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.style.borderColor = '';
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                document.getElementById('fileInput').files = files;
                handleFile(document.getElementById('fileInput'));
            }
        });

        // ============================================
        // API HELPER
        // ============================================

        async function apiCall(endpoint, method = 'GET', data = null) {
            const options = {
                method,
                headers: { 'Content-Type': 'application/json' }
            };

            if (data) {
                options.body = JSON.stringify(data);
            }

            const response = await fetch(`${API_BASE}${endpoint}`, options);

            if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
            }

            return await response.json();
        }

        // ============================================
        // START MIGRATION
        // ============================================

        async function startMigration() {
            let inputPath;

            if (currentUploadPath) {
                inputPath = currentUploadPath;
            } else {
                inputPath = document.getElementById('inputPath').value.trim();
            }

            if (!inputPath) {
                alert('Please upload a file or enter a path');
                return;
            }

            const payload = {
                websphere_input: inputPath,
                liberty_output: document.getElementById('outputDir').value,
                max_iterations: parseInt(document.getElementById('maxIterations').value)
            };

            try {
                const result = await apiCall('/api/v1/orchestrate', 'POST', payload);

                if (result.job_id) {
                    activeJobs.add(result.job_id);
                    addJobToTimeline(result.job_id, 'started', new Date().toISOString());
                    startPolling();
                }
            } catch (error) {
                alert('Failed to start migration: ' + error.message);
            }
        }

        // ============================================
        // JOB TIMELINE
        // ============================================

        function addJobToTimeline(jobId, status, timestamp) {
            const timeline = document.getElementById('timeline');

            // Remove empty state
            const emptyState = timeline.querySelector('.empty-state');
            if (emptyState) {
                emptyState.remove();
            }

            const jobCard = document.createElement('div');
            jobCard.className = `job-card glass-panel status-${status}`;
            jobCard.id = `job-${jobId}`;

            jobCard.innerHTML = `
                <div class="job-header" onclick="toggleJobBody('${jobId}')">
                    <div class="job-header-left">
                        <span class="job-id">Job #${jobId.substring(0, 8)}</span>
                        <span class="job-timestamp">${new Date(timestamp).toLocaleString()}</span>
                    </div>
                    <div class="job-header-right">
                        <span class="status-badge ${status}">${status}</span>
                        <span class="duration" id="duration-${jobId}">-</span>
                        <i data-lucide="chevron-down" class="chevron" id="chevron-${jobId}"></i>
                    </div>
                </div>
                <div class="job-body" id="body-${jobId}">
                    <div class="phase-pills" id="phases-${jobId}"></div>
                    <div class="log-console" id="logs-${jobId}"></div>
                    <div id="hitl-${jobId}"></div>
                </div>
            `;

            timeline.insertBefore(jobCard, timeline.firstChild);
            lucide.createIcons();
        }

        function toggleJobBody(jobId) {
            const body = document.getElementById(`body-${jobId}`);
            const chevron = document.getElementById(`chevron-${jobId}`);

            body.classList.toggle('expanded');
            chevron.classList.toggle('expanded');
        }

        // ============================================
        // JOB POLLING & UPDATES
        // ============================================

        function startPolling() {
            if (!pollInterval) {
                pollInterval = setInterval(updateJobs, 2000);
            }
            updateJobs();
        }

        async function updateJobs() {
            try {
                const data = await apiCall('/api/v1/jobs');
                const jobIds = Object.keys(data.jobs || {});

                for (const jobId of jobIds) {
                    if (activeJobs.has(jobId)) {
                        const job = await apiCall(`/api/v1/jobs/${jobId}`);
                        updateJobCard(jobId, job);

                        if (job.status === 'completed' || job.status === 'failed' || job.status === 'cancelled') {
                            activeJobs.delete(jobId);
                        }
                    }
                }

                if (activeJobs.size === 0 && pollInterval) {
                    clearInterval(pollInterval);
                    pollInterval = null;
                }
            } catch (error) {
                console.error('Poll error:', error);
            }
        }

        function updateJobCard(jobId, job) {
            const card = document.getElementById(`job-${jobId}`);
            if (!card) return;

            // Update status
            card.className = `job-card glass-panel status-${job.status}`;
            const badge = card.querySelector('.status-badge');
            badge.className = `status-badge ${job.status}`;
            badge.textContent = job.status;

            // Update phases
            updatePhases(jobId, job);

            // Update logs
            updateLogs(jobId, job);

            // Update HITL panel
            if (job.status === 'waiting_for_human') {
                showHITLPanel(jobId, job);
            }
        }

        function updatePhases(jobId, job) {
            const phasesContainer = document.getElementById(`phases-${jobId}`);
            if (!phasesContainer) return;

            const phases = [
                { name: 'Discovery', status: 'completed' },
                { name: 'Transform', status: job.current_phase === 'transforming' ? 'active' : (job.current_phase === 'validating' || job.current_phase === 'output_ready' ? 'completed' : 'pending') },
                { name: 'Validate', status: job.current_phase === 'validating' ? 'active' : (job.current_phase === 'output_ready' ? 'completed' : 'pending') },
                { name: 'Output', status: job.current_phase === 'output_ready' ? 'completed' : 'pending' }
            ];

            phasesContainer.innerHTML = phases.map(phase => `
                <div class="phase-pill ${phase.status}">
                    <i data-lucide="${phase.status === 'completed' ? 'check-circle' : (phase.status === 'active' ? 'loader' : 'circle')}"></i>
                    ${phase.name}
                </div>
            `).join('');

            lucide.createIcons();
        }

        function updateLogs(jobId, job) {
            const logsContainer = document.getElementById(`logs-${jobId}`);
            if (!logsContainer || !job.progress_details) return;

            logsContainer.classList.add('visible');

            const logs = job.progress_details.slice(-20).map(event => {
                const time = new Date(event.timestamp).toLocaleTimeString();
                const type = event.type || '';
                const data = event.data || {};

                let message = '';
                if (type === 'discovery') {
                    message = `Found ${data.file_count || 0} files`;
                } else if (type === 'transformation_done') {
                    message = `✓ Transformed ${data.files_transformed || 0} files`;
                } else if (type === 'validation_done') {
                    message = data.success ? '✓ Validation passed' : '✗ Validation failed';
                } else {
                    message = type;
                }

                const logClass = message.includes('✓') ? 'success' : (message.includes('✗') ? 'error' : '');

                return `<div class="log-line ${logClass}"><span class="log-time">${time}</span>${message}</div>`;
            }).join('');

            logsContainer.innerHTML = logs;
            logsContainer.scrollTop = logsContainer.scrollHeight;
        }

        function showHITLPanel(jobId, job) {
            const hitlContainer = document.getElementById(`hitl-${jobId}`);
            if (!hitlContainer) return;

            hitlContainer.innerHTML = `
                <div class="hitl-panel glass-panel">
                    <div class="hitl-header">
                        <i data-lucide="alert-circle"></i>
                        <h4>Validation Failed - Decision Required</h4>
                    </div>
                    <div class="hitl-error">
                        ${job.error || 'Validation failed. Choose an action below.'}
                    </div>
                    <div class="hitl-actions">
                        <button class="btn btn-primary" onclick="submitDecision('${jobId}', 'llm_fix')">
                            <i data-lucide="cpu"></i>
                            Let LLM Fix It
                        </button>
                        <button class="btn btn-secondary" onclick="submitDecision('${jobId}', 'manual_fix')">
                            <i data-lucide="edit"></i>
                            I'll Fix Manually
                        </button>
                        <button class="btn btn-secondary" onclick="submitDecision('${jobId}', 'skip')">
                            <i data-lucide="skip-forward"></i>
                            Skip Validation
                        </button>
                        <button class="btn btn-secondary" onclick="submitDecision('${jobId}', 'abort')">
                            <i data-lucide="x-circle"></i>
                            Cancel Job
                        </button>
                    </div>
                    <div class="hitl-info">
                        <i data-lucide="folder"></i>
                        Output location: <code>${job.output_path || 'N/A'}</code>
                    </div>
                </div>
            `;

            lucide.createIcons();
        }

        async function submitDecision(jobId, decision) {
            try {
                await apiCall(`/api/v1/jobs/${jobId}/decision`, 'POST', { decision });
                document.getElementById(`hitl-${jobId}`).innerHTML = '';
            } catch (error) {
                alert('Failed to submit decision: ' + error.message);
            }
        }

        // ============================================
        // INITIALIZE
        // ============================================

        async function initialize() {
            try {
                const data = await apiCall('/api/v1/jobs');
                const jobIds = Object.keys(data.jobs || {}).sort((a, b) => {
                    const tA = data.jobs[a].created_at ? new Date(data.jobs[a].created_at).getTime() : 0;
                    const tB = data.jobs[b].created_at ? new Date(data.jobs[b].created_at).getTime() : 0;
                    return tB - tA;
                }).slice(0, 10);

                for (const jobId of jobIds) {
                    const job = data.jobs[jobId];
                    addJobToTimeline(jobId, job.status, job.created_at);

                    if (job.status === 'running' || job.status === 'started' || job.status === 'waiting_for_human') {
                        activeJobs.add(jobId);
                    }
                }

                if (activeJobs.size > 0) {
                    startPolling();
                }
            } catch (error) {
                console.error('Failed to load jobs:', error);
            }

            lucide.createIcons();
        }

        // Start
        initialize();
    </script>
</body>
